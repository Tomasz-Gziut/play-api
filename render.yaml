services:
  - type: web
    name: play-api
    runtime: python
    buildCommand: >
      pip install -r requirements.txt &&
      npm install --prefix frontend &&
      npm run build --prefix frontend
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
